name: 고래 데이터 자동 업데이트

on:
  schedule:
    # 평일 오전 8시 (KST = UTC+9, 즉 UTC 23:00 전날)
    - cron: '0 23 * * 1-5'
    # 평일 오후 4시 (장 마감 후 KRX 수집)
    - cron: '0 7 * * 1-5'
    # 평일 오후 5시 전체 업데이트
    - cron: '0 8 * * 1-5'
  workflow_dispatch:  # 수동 실행 허용

jobs:
  collect-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 의존성 설치
        run: |
          pip install requests python-dotenv

      - name: 🏦 DART 지분변동 수집
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python scripts/fetch_dart.py

      - name: 🇺🇸 SEC 13F 수집 (국민연금 + 투자전설)
        run: python scripts/fetch_sec.py

      - name: 📊 데이터 병합 & 인덱스 업데이트
        run: python scripts/build_index.py

      - name: 📈 KRX 외국인·기관 순매수 수집 (16시 이후)
        run: python scripts/fetch_krx.py

      - name: 🚀 GitHub Pages 배포
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🐋 데이터 자동 업데이트 $(date '+%Y-%m-%d %H:%M')"
          file_pattern: 'data/*.json index.html'
