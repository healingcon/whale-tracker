
name: 고래 데이터 자동 업데이트

on:
  schedule:
    - cron: '0 23 * * 1-5'
    - cron: '0 7 * * 1-5'
    - cron: '0 8 * * 1-5'
  workflow_dispatch:

jobs:
  collect-data:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 의존성 설치
        run: pip install requests anthropic

      - name: 🏦 DART 지분변동 수집
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python scripts/fetch_dart.py

      - name: 🇺🇸 SEC 13F 수집
        run: python scripts/fetch_sec.py

      - name: 📈 KRX 외국인·기관 순매수 수집
        run: python scripts/fetch_krx.py

